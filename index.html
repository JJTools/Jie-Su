<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 魔法时光书 ✨</title>
    
    <!-- 引入复古魔法风格的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+SC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    
    <!-- 暴力引入全球三大顶级节点，只要有一个没被墙就能拥有卷曲效果 -->
    <script src="https://fastly.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/page-flip/2.0.7/js/page-flip.browser.min.js"></script>

    <style>
        /* 沉浸式魔法全屏背景 */
        body { 
            background: radial-gradient(circle at center, #2b133d 0%, #0a0510 100%); 
            font-family: 'Noto Serif SC', serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            color: #e0d4f5;
            user-select: none; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; 
        }

        #app-background {
            position: fixed;
            inset: -40px;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, #2b133d 0%, #0a0510 100%);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(var(--background-blur, 18px)) brightness(var(--background-brightness, 0.75));
            transform: scale(1.05);
        }

        #app-background::after {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--background-overlay, rgba(10, 5, 16, 0.35));
        }

        /* 加载动画 */
        #loading {
            position: absolute;
            color: #d4af37;
            font-size: 2rem;
            font-family: 'Zhi Mang Xing', cursive;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            animation: pulse 1.5s infinite alternate;
            z-index: 100;
            text-align: center;
        }
        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1.05); }
        }

        /* =========================================
           书本基础容器（自适应核心算法） 
           ========================================= */
        #flipbook { 
            position: relative;
            z-index: 2;
            width: min(100vw, calc(100dvh * 0.7142));
            height: 100vh;
            height: 100dvh;
            max-width: none;
            max-height: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 30px rgba(108, 48, 130, 0.6); 
            border-radius: 4px; 
            opacity: 0; 
            transition: opacity 1s ease;
        }
        #flipbook.ready { opacity: 1; }
        
        /* 每一页的视觉皮肤 */
        .my-page { 
            background-color: #f1e6cc; 
            background-image: 
                radial-gradient(circle, rgba(139, 69, 19, 0.05) 0%, transparent 80%),
                linear-gradient(to right, rgba(0,0,0,0.05) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.05) 100%);
            box-shadow: inset 0 0 30px rgba(139, 69, 19, 0.15);
            box-sizing: border-box; 
            padding: 40px 45px; 
            border-left: 1px solid rgba(139, 69, 19, 0.2); 
            border-right: 1px solid rgba(139, 69, 19, 0.2); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: #3e2723; 
        }
        
        /* 魔法书封面 */
        .my-page.cover { 
            position: relative;
            background: linear-gradient(135deg, #2a113a, #150621);
            border: 8px solid #000;
            outline: 2px solid #d4af37;
            outline-offset: -10px;
            color: #d4af37; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        .cover-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: var(--cover-image-opacity, 0.62);
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }
        .cover-content {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 0 18px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .my-page.cover.has-cover-image::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg, rgba(21, 6, 33, 0.2), rgba(21, 6, 33, 0.78));
            pointer-events: none;
        }
        .my-page.cover h1 { font-family: 'Zhi Mang Xing', cursive; font-size: 4.5rem; margin-bottom: 0px; text-shadow: 0 0 15px rgba(0, 0, 0, 0.75), 0 0 18px rgba(212, 175, 55, 0.6); }
        .my-page.cover p { font-size: 1.4rem; letter-spacing: 5px; margin-top: 15px; color: #f0d58a; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75); }
        
        /* 日记内容排版 */
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(139, 69, 19, 0.3); padding-bottom: 10px; margin-bottom: 20px; }
        .page-date { font-size: 1.2rem; font-weight: bold; font-family: 'Cinzel', serif; color: #5d4037; }
        .page-mark { color: rgba(139, 69, 19, 0.4); }
        .page-title { font-size: 1.6rem; font-weight: bold; margin: 10px 0 15px 0; color: #2e1a12; }
        .page-text { font-size: 1.15rem; line-height: 1.9; color: #3e2723; flex: 0 0 auto; white-space: pre-wrap; }
        .book-error { justify-content: center; text-align: center; }
        .book-error .page-text { flex-grow: 0; }
        
        /* =========================================
           单图与单视频容器
           ========================================= */
        .page-media { 
            margin-top: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 280px; 
            background: #fffcf5; 
            border-radius: 4px; 
            overflow: hidden; 
            border: 6px solid #fff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            transform: rotate(-1.5deg); 
        }
        .my-page:nth-child(even) .page-media { transform: rotate(1.5deg); }
        .page-media img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        /* =========================================
           微信朋友圈九宫格 (多图容器) 
           ========================================= */
        .page-media-grid {
            margin-top: 12px; 
            display: grid; 
            gap: 4px; 
            padding: 4px;
            height: var(--media-grid-height, 280px); 
            background: #fffcf5; 
            border-radius: 4px; 
            overflow: hidden; 
            border: 6px solid #fff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            transform: rotate(-1.5deg); 
            box-sizing: border-box;
        }
        .my-page:nth-child(even) .page-media-grid { transform: rotate(1.5deg); }
        .page-media-grid img { 
            width: 100%; 
            height: 100%; 
            min-width: 0;
            min-height: 0;
            object-fit: cover; 
            border-radius: 2px; 
            cursor: zoom-in; 
            transition: 0.2s;
        }
        .page-media-grid img:hover { filter: brightness(0.9); }
        
        /* 根据图片数量自动分行分列 */
        .page-media-grid.grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .page-media-grid.grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .page-media-grid.grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .page-media-grid.grid-multi { grid-template-columns: repeat(3, minmax(0, 1fr)); } /* 5-9 图自动均分 */

        /* =========================================
           视频缩略图展示层 (解决页面排版变形问题)
           ========================================= */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            cursor: pointer;
            border-radius: 2px;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 让视频封面填满相框，不再变形 */
            display: block;
            opacity: 0.9;
            transition: 0.2s;
        }
        .video-wrapper:hover video { opacity: 0.7; }
        .video-wrapper:hover .play-btn { background: rgba(212, 175, 55, 0.9); transform: translate(-50%, -50%) scale(1.1); }
        .play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 46px; height: 46px; background: rgba(0,0,0,0.6); color: #fff;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 20px; padding-left: 4px; box-sizing: border-box; transition: 0.2s;
            pointer-events: none; /* 让点击穿透到 wrapper */
        }

        .page-footer { text-align: center; font-size: 0.9rem; color: #8d6e63; margin-top: 25px; border-top: 1px solid rgba(139, 69, 19, 0.2); padding-top: 10px; font-family: 'Cinzel', serif; }
        .cover-symbol { width: 60px; height: 60px; border: 2px solid #d4af37; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; }
        .cover-symbol span { transform: rotate(-45deg); font-size: 30px; }

        /* =========================================
           移动端自适应 (按比例缩小) 
           ========================================= */
        @media (max-width: 480px) {
            #flipbook {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-width: none;
                max-height: none;
            }
            #flipbook .stf__wrapper,
            #flipbook .stf__block,
            #flipbook canvas {
                max-width: 100vw !important;
            }
            .cover-content { padding: 0 10px; }
            .my-page { padding: 25px 20px; } 
            .my-page.cover h1 {
                font-size: 2.2rem;
                line-height: 1.1;
                white-space: nowrap;
                word-break: keep-all;
                overflow-wrap: normal;
            }
            .my-page.cover p { font-size: 0.95rem; letter-spacing: 1px; white-space: nowrap; }
            .page-header { margin-bottom: 12px; padding-bottom: 8px; }
            .page-date { font-size: 1rem; }
            .page-title { font-size: 1.3rem; margin: 5px 0 10px 0; }
            .page-text { font-size: 0.95rem; line-height: 1.7; }
            .page-media { margin-top: 10px; height: 180px; border-width: 4px; gap: 3px; padding: 3px;} 
            .page-media-grid { margin-top: 10px; height: var(--media-grid-height-mobile, var(--media-grid-height, 180px)); border-width: 4px; gap: 3px; padding: 3px;} 
            .play-btn { width: 36px; height: 36px; font-size: 16px; }
            .page-footer { margin-top: 15px; padding-top: 8px; font-size: 0.8rem; }
        }
        @media (max-width: 360px) {
            #flipbook {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-height: none;
            }
            .my-page { padding: 15px 15px; }
            .my-page.cover h1 { font-size: 1.95rem; }
            .page-title { font-size: 1.1rem; }
            .page-text { font-size: 0.85rem; line-height: 1.6; }
            .page-media { height: 150px; }
            .page-media-grid { height: var(--media-grid-height-small, var(--media-grid-height-mobile, var(--media-grid-height, 150px))); }
        }

        /* =========================================
           原生 3D 备用引擎 
           ========================================= */
        #flipbook.css-3d-mode { perspective: 2500px; }
        #flipbook.css-3d-mode .my-page {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transform-origin: left center;
            transform: rotateY(0deg) translateZ(0);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease-in-out 0.2s;
            backface-visibility: hidden;
        }
        #flipbook.css-3d-mode .my-page.flipped {
            transform: rotateY(-150deg) scale(0.96) translateZ(-20px); 
            opacity: 0; pointer-events: none;
        }

        /* =========================================
           全屏多媒体放大查看器 (Lightbox) 
           解决视频变形和放大播放的核心容器
           ========================================= */
        #media-viewer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 99999; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #media-viewer.show { opacity: 1; pointer-events: auto; }
        
        #viewer-img, #viewer-video {
            max-width: 90vw; max-height: 90vh; 
            object-fit: contain; /* 保证原始比例显示，绝对不拉伸变形 */
            border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; /* 根据类型动态显示 */
            outline: none;
        }
        #media-viewer.show #viewer-img[src]:not([src=""]),
        #media-viewer.show #viewer-video[src]:not([src=""]) {
            display: block; transform: scale(1);
        }
    </style>
</head>
<body>

<div id="app-background" aria-hidden="true"></div>

<!-- 全屏放大查看器：支持图片和视频以原本尺寸播放 -->
<div id="media-viewer" onclick="hideViewer()">
    <img id="viewer-img" src="" alt="放大查看" onclick="event.stopPropagation()">
    <!-- 视频在全屏时自带系统控件 -->
    <video id="viewer-video" src="" controls onclick="event.stopPropagation()"></video>
</div>

<!-- 加载提示 -->
<div id="loading">
    ✨ 魔法汇聚中...<br>
    <small style="font-size: 1rem; color: #a0a0a0; font-family: 'Noto Serif SC', serif;">正在渲染纸张，请稍候...</small>
</div>

<!-- 魔法书实体 -->
<div id="flipbook" aria-live="polite">
    <!-- 页面内容由 data/months.json 渲染 -->
</div>

<script>
    // ==========================================
    // 全局多媒体弹出查看器逻辑 (Lightbox)
    // ==========================================
    const mediaViewer = document.getElementById('media-viewer');
    const viewerImg = document.getElementById('viewer-img');
    const viewerVideo = document.getElementById('viewer-video');
    const BOOK_DATA_URL = 'data/months.json';
    const MEDIA_PRELOAD_PAGE_COUNT = 5;
    const LAZY_IMAGE_PLACEHOLDER = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

    // 显示放大内容 (区分图片和视频)
    function showViewer(src, type = 'image') {
        if (type === 'video') {
            viewerImg.src = "";           // 清空图片内容
            viewerVideo.src = src;        // 设置视频源
            viewerVideo.play().catch(() => {}); // 弹出后自动播放
        } else {
            viewerVideo.src = "";         // 清空视频内容
            viewerImg.src = src;          // 设置图片源
        }
        mediaViewer.classList.add('show');
    }

    // 隐藏查看器并停止播放
    function hideViewer() {
        mediaViewer.classList.remove('show');
        if (!viewerVideo.paused) {
            viewerVideo.pause();          // 关闭时自动暂停
        }
        // 等待淡出动画结束后再清空 src，防止视觉闪烁
        setTimeout(() => { 
            viewerImg.src = ""; 
            viewerVideo.src = ""; 
        }, 300);
    }

    // ==========================================
    // JSON 数据渲染与魔法翻书引擎逻辑
    // ==========================================
    document.addEventListener("DOMContentLoaded", async function() {
        const flipbookEl = document.getElementById('flipbook');
        const loadingEl = document.getElementById('loading');

        try {
            const bookData = await loadBookData();
            applyPageBackground(bookData.background);
            renderBook(flipbookEl, bookData);
            initFlipbook(flipbookEl, loadingEl);
        } catch (error) {
            console.error("魔法书配置加载失败", error);
            renderErrorPage(flipbookEl);
            loadingEl.innerHTML = '配置加载失败<br><small style="font-size: 1rem; color: #a0a0a0; font-family: \'Noto Serif SC\', serif;">请检查 data/months.json 后刷新页面</small>';
            flipbookEl.classList.add('ready');
        }
    });

    async function loadBookData() {
        const response = await fetch(BOOK_DATA_URL, { cache: 'no-store' });
        if (!response.ok) {
            throw new Error(`无法读取 ${BOOK_DATA_URL}: ${response.status}`);
        }
        return response.json();
    }

    function renderBook(flipbookEl, bookData) {
        const cover = bookData.cover || {};
        const ending = bookData.ending || {};
        const months = Array.isArray(bookData.months) ? bookData.months : [];

        flipbookEl.innerHTML = '';
        flipbookEl.appendChild(createCoverPage(cover));
        months.forEach((month, index) => {
            flipbookEl.appendChild(createMonthPage(month, index + 1));
        });
        flipbookEl.appendChild(createBackCover(ending.text || '故事仍在继续...'));
    }

    function applyPageBackground(background = {}) {
        const backgroundEl = document.getElementById('app-background');
        if (!backgroundEl) return;

        if (background.image) {
            backgroundEl.style.backgroundImage = `url("${background.image}")`;
        }

        if (Number.isFinite(Number(background.blur))) {
            backgroundEl.style.setProperty('--background-blur', `${Number(background.blur)}px`);
        }

        if (Number.isFinite(Number(background.brightness))) {
            backgroundEl.style.setProperty('--background-brightness', Number(background.brightness));
        }

        if (background.overlay) {
            backgroundEl.style.setProperty('--background-overlay', background.overlay);
        }
    }

    function createCoverPage(cover = {}) {
        const page = createElement('div', 'my-page cover');
        page.dataset.density = 'hard';

        if (Number.isFinite(Number(cover.imageOpacity))) {
            page.style.setProperty('--cover-image-opacity', Number(cover.imageOpacity));
        }

        if (cover.image) {
            page.classList.add('has-cover-image');
            const coverImage = createElement('img', 'cover-image');
            coverImage.src = cover.image;
            coverImage.alt = cover.imageAlt || cover.title || '魔法书封面';
            coverImage.loading = 'eager';
            coverImage.draggable = false;
            page.appendChild(coverImage);
        }

        const content = createElement('div', 'cover-content');
        const h1 = createElement('h1');
        h1.textContent = cover.title || '魔法时光书';
        const p = createElement('p');
        p.textContent = cover.subtitle || '✦ Jie与Su的时光机 ✦';

        content.append(h1, p);
        page.appendChild(content);
        return page;
    }

    function createBackCover(text) {
        const page = createElement('div', 'my-page cover');
        page.dataset.density = 'hard';

        const symbol = createElement('div', 'cover-symbol');
        const symbolText = createElement('span');
        symbolText.textContent = '✦';
        symbol.appendChild(symbolText);

        const p = createElement('p');
        p.style.marginTop = '40px';
        p.style.fontSize = '1.2rem';
        p.textContent = text;

        page.append(symbol, p);
        return page;
    }

    function createMonthPage(month, pageNumber) {
        const page = createElement('div', 'my-page');
        const header = createElement('div', 'page-header');
        const date = createElement('div', 'page-date');
        const mark = createElement('div', 'page-mark');
        const title = createElement('div', 'page-title');
        const text = createElement('div', 'page-text');
        const footer = createElement('div', 'page-footer');
        const mediaItems = normalizeMedia(month);

        date.textContent = month.time || '';
        mark.textContent = '✦';
        title.textContent = month.title || '未命名记忆';
        text.textContent = month.body || '';
        footer.textContent = `- Page ${pageNumber} -`;

        header.append(date, mark);
        page.append(header, title, text);
        if (mediaItems.length > 0) {
            page.appendChild(createMediaBlock(mediaItems));
        }
        page.appendChild(footer);
        return page;
    }

    function normalizeMedia(month) {
        const configuredMedia = Array.isArray(month.media) ? month.media : [];
        const shortcutMedia = [];

        if (month.image) {
            shortcutMedia.push({ type: 'image', src: month.image, alt: month.title });
        }
        if (Array.isArray(month.images)) {
            month.images.forEach((image) => {
                shortcutMedia.push(typeof image === 'string' ? { type: 'image', src: image, alt: month.title } : image);
            });
        }
        if (month.video) {
            shortcutMedia.push({ type: 'video', src: month.video, poster: month.poster, alt: month.title });
        }

        const source = configuredMedia.length > 0 ? configuredMedia : shortcutMedia;
        return source
            .map((item) => {
                const media = typeof item === 'string' ? { type: 'image', src: item } : item;
                const src = media && (media.src || media.url);
                if (!src) return null;
                return {
                    type: media.type === 'video' ? 'video' : 'image',
                    src,
                    poster: media.poster || '',
                    alt: media.alt || month.title || '影像'
                };
            })
            .filter(Boolean);
    }

    function createMediaBlock(mediaItems) {
        const visibleMediaItems = mediaItems.slice(0, 9);
        const isSingle = visibleMediaItems.length === 1;
        const mediaBlock = createElement('div', isSingle ? 'page-media' : `page-media-grid ${getGridClass(visibleMediaItems.length)}`);

        if (!isSingle) {
            const rowCount = getGridRowCount(visibleMediaItems.length);
            mediaBlock.style.gridTemplateRows = `repeat(${rowCount}, minmax(0, 1fr))`;
            const heights = getGridHeights(rowCount);
            mediaBlock.style.setProperty('--media-grid-height', heights.desktop);
            mediaBlock.style.setProperty('--media-grid-height-mobile', heights.mobile);
            mediaBlock.style.setProperty('--media-grid-height-small', heights.small);
        }

        visibleMediaItems.forEach((item) => {
            mediaBlock.appendChild(createMediaElement(item));
        });
        return mediaBlock;
    }

    function getGridClass(count) {
        if (count === 2) return 'grid-2';
        if (count === 3) return 'grid-3';
        if (count === 4) return 'grid-4';
        return 'grid-multi';
    }

    function getGridRowCount(count) {
        if (count <= 2) return 1;
        if (count <= 4) return 2;
        return Math.ceil(count / 3);
    }

    function getGridHeights(rowCount) {
        const heightMap = {
            1: { desktop: '92px', mobile: '58px', small: '48px' },
            2: { desktop: '184px', mobile: '119px', small: '99px' },
            3: { desktop: '280px', mobile: '180px', small: '150px' }
        };
        return heightMap[rowCount] || heightMap[3];
    }

    function createMediaElement(item) {
        if (item.type === 'video') {
            const wrapper = createElement('div', 'video-wrapper');
            const video = createElement('video');
            const playBtn = createElement('div', 'play-btn');

            video.dataset.src = item.src;
            video.preload = 'none';
            video.muted = true;
            video.playsInline = true;
            if (item.poster) {
                video.dataset.poster = item.poster;
            }

            playBtn.textContent = '▶';
            wrapper.addEventListener('pointerup', (event) => {
                event.stopPropagation();
                showViewer(item.src, 'video');
            });
            wrapper.append(video, playBtn);
            return wrapper;
        }

        const image = createElement('img');
        image.src = LAZY_IMAGE_PLACEHOLDER;
        image.dataset.src = item.src;
        image.alt = item.alt;
        image.loading = 'lazy';
        image.addEventListener('pointerup', (event) => {
            event.stopPropagation();
            showViewer(item.src, 'image');
        });
        return image;
    }

    function preloadMediaWindow(pages, startPageIndex, pageCount = MEDIA_PRELOAD_PAGE_COUNT) {
        const safeStartIndex = Math.max(0, Math.min(Number(startPageIndex) || 0, pages.length - 1));
        let loadedContentPages = 0;

        for (let index = safeStartIndex; index < pages.length && loadedContentPages < pageCount; index++) {
            const page = pages[index];
            if (page.classList.contains('cover')) {
                continue;
            }

            loadPageMedia(page);
            loadedContentPages++;
        }
    }

    function loadPageMedia(page) {
        page.querySelectorAll('img[data-src]').forEach((image) => {
            image.src = image.dataset.src;
            delete image.dataset.src;
        });

        page.querySelectorAll('video[data-src]').forEach((video) => {
            if (video.dataset.poster) {
                video.poster = video.dataset.poster;
                delete video.dataset.poster;
            }

            video.preload = 'metadata';
            video.src = video.dataset.src;
            delete video.dataset.src;
            video.load();
        });
    }

    function createElement(tagName, className = '') {
        const element = document.createElement(tagName);
        if (className) {
            element.className = className;
        }
        return element;
    }

    function renderErrorPage(flipbookEl) {
        flipbookEl.innerHTML = '';
        const page = createElement('div', 'my-page book-error');
        const title = createElement('div', 'page-title');
        const text = createElement('div', 'page-text');
        title.textContent = '配置加载失败';
        text.textContent = '请确认 data/months.json 存在且 JSON 格式正确。';
        page.append(title, text);
        flipbookEl.appendChild(page);
    }

    function initFlipbook(flipbookEl, loadingEl) {
        const pages = flipbookEl.querySelectorAll('.my-page');
        preloadMediaWindow(pages, 0);

        // 尝试获取外部卷曲引擎类
        let PageFlipClass = null;
        if (typeof window.Strive !== 'undefined' && window.Strive.PageFlip) {
            PageFlipClass = window.Strive.PageFlip;
        } else if (typeof window.PageFlip !== 'undefined') {
            PageFlipClass = window.PageFlip;
        }

        if (typeof PageFlipClass === 'function' && window.innerWidth > 480) {
            // 引擎 1：成功加载了卷曲引擎
            try {
                const pageSize = getResponsivePageSize();
                const pageFlipInstance = new PageFlipClass(flipbookEl, {
                    width: pageSize.width,
                    height: pageSize.height,
                    size: "stretch",
                    minWidth: Math.min(200, pageSize.width),
                    maxWidth: pageSize.width,
                    minHeight: Math.min(280, pageSize.height),
                    maxHeight: pageSize.height,
                    showCover: true, flippingTime: 1200,
                    maxShadowOpacity: 0.8, drawBookShadow: true,
                    useMouseEvents: false,
                    usePortrait: true
                });

                pageFlipInstance.loadFromHTML(pages);
                let currentPageIndex = 0;
                if (typeof pageFlipInstance.on === 'function') {
                    pageFlipInstance.on('flip', (event) => {
                        currentPageIndex = Number(event.data) || 0;
                        preloadMediaWindow(pages, currentPageIndex);
                    });
                }

                bindPageNavigation({
                    onPrev: () => {
                        pageFlipInstance.flipPrev();
                        currentPageIndex = Math.max(0, currentPageIndex - 1);
                        preloadMediaWindow(pages, currentPageIndex);
                    },
                    onNext: () => {
                        pageFlipInstance.flipNext();
                        currentPageIndex = Math.min(pages.length - 1, currentPageIndex + 1);
                        preloadMediaWindow(pages, currentPageIndex);
                    }
                });

                finishLoading();
            } catch (e) {
                console.warn("卷曲引擎执行异常，立即切换至备用引擎", e);
                initFallback3DEngine();
            }
        } else {
            // 引擎 2：启用原生 3D 引擎
            initFallback3DEngine();
        }

        // 原生 3D 备用引擎逻辑
        function initFallback3DEngine() {
            flipbookEl.classList.add('css-3d-mode');
            let currentIndex = 0;

            pages.forEach((page, index) => { page.style.zIndex = pages.length - index; });

            bindPageNavigation({
                onPrev: () => {
                    if (currentIndex > 0) {
                        currentIndex--;
                        pages[currentIndex].classList.remove('flipped');
                        preloadMediaWindow(pages, currentIndex);
                    }
                },
                onNext: () => {
                    if (currentIndex < pages.length - 1) {
                        pages[currentIndex].classList.add('flipped');
                        currentIndex++;
                        preloadMediaWindow(pages, currentIndex);
                    }
                }
            });

            finishLoading();
        }

        function finishLoading() {
            loadingEl.style.display = 'none';
            flipbookEl.classList.add('ready');
        }
    }

    function bindPageNavigation({ onPrev, onNext }) {
        if (window.__magicBookNavBound) {
            return;
        }

        const handler = (e) => {
            const target = e.target instanceof Element ? e.target : null;
            if (!target) {
                return;
            }
            if (target.closest('.page-media, .page-media-grid, .video-wrapper, #media-viewer')) {
                return;
            }

            e.preventDefault();
            e.stopPropagation();

            if (e.clientX < window.innerWidth / 2) {
                onPrev();
            } else {
                onNext();
            }
        };

        const eventName = window.PointerEvent ? 'pointerup' : 'click';
        document.addEventListener(eventName, handler, true);
        window.__magicBookNavBound = true;
    }

    function getResponsivePageSize() {
        const viewportWidth = window.innerWidth || 500;
        const viewportHeight = window.innerHeight || 700;
        const height = Math.max(280, viewportHeight);
        const width = Math.max(200, Math.min(viewportWidth, Math.floor(height / 1.4)));

        return {
            width,
            height
        };
    }
</script>
